<!--
  THINK FOSTERING - AGENCY SEARCH WIDGET
  =======================================
  Drop this code into your find-an-agency.html page, replacing the existing 
  search section (the #find-agency section with the static search bar).
  
  This connects to your Supabase database and provides live search 
  by agency name, location, postcode, and region with quick-link city buttons.
-->

<!-- REPLACE YOUR EXISTING #find-agency SECTION WITH THIS: -->
<section id="find-agency" style="padding:60px 20px 40px;background:linear-gradient(180deg,#0f172a 0%,#1e293b 100%);text-align:center;">
  
  <h2 style="font-family:'Playfair Display',Georgia,serif;font-size:clamp(28px,5vw,48px);font-weight:700;color:#fff;margin:0 0 16px;">
    Find a <span style="color:#e91e8c;">Fostering Agency</span> Near You
  </h2>
  <p style="font-size:clamp(14px,2vw,17px);color:#94a3b8;margin:0 auto 32px;max-width:600px;">
    Enter your postcode or town to discover trusted fostering agencies in your area
  </p>

  <!-- Search Bar -->
  <div id="tf-search-bar" style="max-width:640px;margin:0 auto 20px;background:#fff;border-radius:50px;padding:6px 6px 6px 28px;display:flex;align-items:center;box-shadow:0 8px 32px rgba(0,0,0,0.3);">
    <input id="tf-search-input" type="text" placeholder="Enter your postcode or town..." 
      style="flex:1;border:none;outline:none;font-size:16px;font-family:'DM Sans',sans-serif;color:#1a1a1a;background:transparent;padding:12px 0;"
      onkeydown="if(event.key==='Enter')tfSearch()">
    <button onclick="tfSearch()" 
      style="background:linear-gradient(135deg,#e91e8c,#c2185b);color:#fff;border:none;border-radius:50px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:transform .2s;"
      onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
      Search &rarr;
    </button>
  </div>

  <!-- Quick City Buttons -->
  <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:20px;">
    <button onclick="tfQuickSearch('London')" class="tf-city-btn">London</button>
    <button onclick="tfQuickSearch('Manchester')" class="tf-city-btn">Manchester</button>
    <button onclick="tfQuickSearch('Birmingham')" class="tf-city-btn">Birmingham</button>
    <button onclick="tfQuickSearch('Leeds')" class="tf-city-btn">Leeds</button>
    <button onclick="tfQuickSearch('Bristol')" class="tf-city-btn">Bristol</button>
  </div>

  <!-- Advanced Filters (collapsible) -->
  <div style="max-width:700px;margin:0 auto;">
    <button id="tf-filter-toggle" onclick="tfToggleFilters()" 
      style="background:rgba(255,255,255,0.08);color:#94a3b8;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:8px 20px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3"/></svg>
      Advanced Filters
    </button>
    <div id="tf-filters" style="display:none;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:20px;margin-bottom:20px;">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;text-align:left;">
        <div>
          <label style="display:block;font-size:11px;font-weight:700;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;">Region</label>
          <select id="tf-region" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:#1e293b;color:#fff;font-size:13px;font-family:'DM Sans',sans-serif;">
            <option value="">All Regions</option>
            <option>North West</option><option>North East</option><option>Yorkshire and the Humber</option>
            <option>West Midlands</option><option>East Midlands</option><option>East of England</option>
            <option>South East</option><option>South West</option><option>London</option>
            <option>Wales</option><option>Scotland</option><option>Northern Ireland</option>
          </select>
        </div>
        <div>
          <label style="display:block;font-size:11px;font-weight:700;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;">Min Salary (£)</label>
          <input id="tf-sal-min" type="number" placeholder="e.g. 300" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:#1e293b;color:#fff;font-size:13px;font-family:'DM Sans',sans-serif;box-sizing:border-box;">
        </div>
        <div>
          <label style="display:block;font-size:11px;font-weight:700;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;">Max Salary (£)</label>
          <input id="tf-sal-max" type="number" placeholder="e.g. 800" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:#1e293b;color:#fff;font-size:13px;font-family:'DM Sans',sans-serif;box-sizing:border-box;">
        </div>
      </div>
    </div>
  </div>

  <!-- Results Container -->
  <div id="tf-results" style="max-width:800px;margin:0 auto;text-align:left;"></div>
</section>

<style>
  .tf-city-btn {
    background: rgba(255,255,255,0.08);
    color: #cbd5e1;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .2s;
  }
  .tf-city-btn:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
  }
  .tf-agency-card {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #e2e8f0;
    margin-bottom: 14px;
    overflow: hidden;
    transition: box-shadow .25s, transform .25s;
    cursor: pointer;
  }
  .tf-agency-card:hover {
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    transform: translateY(-2px);
  }
  .tf-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .tf-badge-green { background:#ecfdf5; color:#059669; }
  .tf-badge-amber { background:#fffbeb; color:#d97706; }
  .tf-badge-grey { background:#f1f5f9; color:#64748b; }
  .tf-benefit-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    background: #ecfdf5;
    color: #059669;
    font-weight: 500;
    margin: 2px 3px 2px 0;
  }
  .tf-contact-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    color: #334155;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    transition: background .2s;
  }
  .tf-contact-btn:hover { background:#f1f5f9; }
</style>

<script>
(function(){
  const SUPA_URL = "https://jixrqmlfuwsazzcfenmh.supabase.co";
  const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppeHJxbWxmdXdzYXp6Y2Zlbm1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDkwNDAsImV4cCI6MjA4ODM4NTA0MH0.FVFePooOrcqXR-TF6-90403K6lv5GbUY92MDD1H-Sd4";

  async function fetchAgencies(params){
    let q = "agencies?select=*&is_active=eq.true&order=name.asc";
    if(params.region) q += "&region=eq."+encodeURIComponent(params.region);
    if(params.search) q += "&or=(name.ilike.*"+encodeURIComponent(params.search)+"*,city.ilike.*"+encodeURIComponent(params.search)+"*,county.ilike.*"+encodeURIComponent(params.search)+"*,postcode.ilike.*"+encodeURIComponent(params.search)+"*,description.ilike.*"+encodeURIComponent(params.search)+"*)";
    if(params.salMin) q += "&salary_max.gte."+params.salMin;
    if(params.salMax) q += "&salary_min.lte."+params.salMax;
    const r = await fetch(SUPA_URL+"/rest/v1/"+q, {headers:{apikey:SUPA_KEY,Authorization:"Bearer "+SUPA_KEY}});
    return r.ok ? r.json() : [];
  }

  function fmtSalary(mn,mx,t){
    if(!mn&&!mx)return"";
    const f=v=>"£"+Number(v).toLocaleString();
    const s=t==="annual"?"/yr":t==="monthly"?"/mo":"/wk";
    if(mn&&mx)return f(mn)+"–"+f(mx)+s;
    return mn?"From "+f(mn)+s:"Up to "+f(mx)+s;
  }

  function renderCard(a){
    const benefits = Array.isArray(a.benefits)?a.benefits:[];
    const sal = fmtSalary(a.salary_min,a.salary_max,a.salary_type);
    const rc = (a.ofsted_rating==="Outstanding"||a.ofsted_rating==="Good")?"green":a.ofsted_rating==="Requires Improvement"?"amber":"grey";
    const id = "tf-card-"+a.id;
    
    let html = '<div class="tf-agency-card" onclick="document.getElementById(\''+id+'\').style.display=document.getElementById(\''+id+'\').style.display===\'none\'?\'block\':\'none\'">';
    html += '<div style="padding:20px;display:flex;gap:16px;align-items:flex-start;">';
    
    // Logo
    if(a.logo_url){
      html += '<img src="'+a.logo_url+'" style="width:56px;height:56px;border-radius:12px;object-fit:cover;border:1px solid #e2e8f0;flex-shrink:0">';
    } else {
      html += '<div style="width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,#E8B931,#D4A020);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700;flex-shrink:0">'+(a.name?a.name.charAt(0):"?")+'</div>';
    }
    
    html += '<div style="flex:1;min-width:0">';
    html += '<div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">';
    html += '<h3 style="font-family:Playfair Display,Georgia,serif;font-size:17px;font-weight:700;margin:0;color:#1a1a1a">'+a.name+'</h3>';
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
    if(a.ofsted_rating) html += '<span class="tf-badge tf-badge-'+rc+'">'+a.ofsted_rating+'</span>';
    html += '<span class="tf-badge tf-badge-grey">'+a.region+'</span>';
    html += '</div></div>';
    
    // Location & salary
    html += '<div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:6px">';
    if(a.city) html += '<span style="font-size:13px;color:#64748b">📍 '+[a.city,a.postcode].filter(Boolean).join(", ")+'</span>';
    if(sal) html += '<span style="font-size:13px;color:#059669;font-weight:600">💷 '+sal+'</span>';
    html += '</div>';
    
    // Description preview
    if(a.description) html += '<p style="font-size:13px;color:#475569;margin:8px 0 0;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+a.description+'</p>';
    
    // Benefits preview
    if(benefits.length>0){
      html += '<div style="margin-top:8px">';
      benefits.slice(0,4).forEach(function(b){ html += '<span class="tf-benefit-tag">'+b+'</span>'; });
      if(benefits.length>4) html += '<span style="font-size:11px;color:#94a3b8">+'+( benefits.length-4)+' more</span>';
      html += '</div>';
    }
    
    html += '</div></div>';
    
    // Expanded detail
    html += '<div id="'+id+'" style="display:none;padding:0 20px 20px;border-top:1px solid #f1f5f9;padding-top:16px">';
    if(a.services) html += '<p style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin:0 0 4px">Services</p><p style="font-size:13px;color:#334155;margin:0 0 12px;line-height:1.5">'+a.services+'</p>';
    if(a.address_line1) html += '<p style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin:0 0 4px">Address</p><p style="font-size:13px;color:#334155;margin:0 0 12px">'+[a.address_line1,a.address_line2,a.city,a.county,a.postcode].filter(Boolean).join(", ")+'</p>';
    if(a.ofsted_registration_number) html += '<p style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin:0 0 4px">Ofsted Reg.</p><p style="font-size:13px;color:#334155;margin:0 0 12px">'+a.ofsted_registration_number+'</p>';
    if(benefits.length>0){
      html += '<p style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin:0 0 6px">Benefits</p><div style="margin-bottom:12px">';
      benefits.forEach(function(b){ html += '<span class="tf-benefit-tag">'+b+'</span>'; });
      html += '</div>';
    }
    html += '<div style="display:flex;flex-wrap:wrap;gap:8px">';
    if(a.phone) html += '<a href="tel:'+a.phone+'" class="tf-contact-btn" onclick="event.stopPropagation()">📞 '+a.phone+'</a>';
    if(a.email) html += '<a href="mailto:'+a.email+'" class="tf-contact-btn" onclick="event.stopPropagation()">✉️ '+a.email+'</a>';
    if(a.website) html += '<a href="'+a.website+'" target="_blank" rel="noopener" class="tf-contact-btn" onclick="event.stopPropagation()">🌐 Website</a>';
    html += '</div></div></div>';
    return html;
  }

  window.tfSearch = async function(){
    const el = document.getElementById("tf-results");
    const search = document.getElementById("tf-search-input").value.trim();
    const region = document.getElementById("tf-region").value;
    const salMin = document.getElementById("tf-sal-min").value;
    const salMax = document.getElementById("tf-sal-max").value;
    
    el.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:30px 0">Searching agencies...</p>';
    
    try {
      const agencies = await fetchAgencies({search,region,salMin,salMax});
      if(agencies.length===0){
        el.innerHTML = '<div style="background:#fff;border-radius:14px;padding:50px 30px;text-align:center"><p style="font-size:17px;font-weight:600;color:#1a1a1a;margin:0 0 6px">No agencies found</p><p style="font-size:14px;color:#64748b;margin:0">Try a different search term or broaden your filters</p></div>';
      } else {
        let html = '<p style="color:#94a3b8;font-size:13px;margin:0 0 14px">'+agencies.length+' agenc'+(agencies.length===1?'y':'ies')+' found</p>';
        agencies.forEach(function(a){ html += renderCard(a); });
        el.innerHTML = html;
      }
    } catch(e){
      el.innerHTML = '<p style="text-align:center;color:#f87171;padding:30px 0">Error loading results. Please try again.</p>';
    }
  };

  window.tfQuickSearch = function(city){
    document.getElementById("tf-search-input").value = city;
    tfSearch();
  };

  window.tfToggleFilters = function(){
    const f = document.getElementById("tf-filters");
    f.style.display = f.style.display==="none"?"block":"none";
  };
})();
</script>
